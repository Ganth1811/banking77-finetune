model:
  model_name: "unsloth/Llama-3.2-1B-Instruct"
  max_seq_length: 128

training:
  batch_size: 4
  learning_rate: 2e-4
  gradient_accumulation_steps: 4
  optimizer: "adamw_8bit"
  epochs: 1
  output_dir: "./outputs"
  seed: 42

lora:
  r: 16
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj",]
  lora_alpha: 32
  lora_dropout: 0